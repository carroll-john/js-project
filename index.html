<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#02020a" />
    <title>Particle Universe — WebGL / Three.js</title>
    <meta
      name="description"
      content="An interactive GPU particle universe that morphs between a spiral galaxy, sphere, torus, double helix and wave field. Built with Three.js, custom GLSL shaders and bloom."
    />
    <link rel="stylesheet" href="styles/style.css" />

    <!-- Three.js (ES modules) loaded from CDN via import map -->
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
      }
    </script>
  </head>

  <body>
    <canvas id="scene"></canvas>

    <!-- Loading / boot overlay -->
    <div id="loader" class="loader">
      <div class="loader__ring"></div>
      <p class="loader__text">summoning particles…</p>
    </div>

    <!-- Heads-up display -->
    <header class="hud hud--top">
      <h1 class="title">PARTICLE&nbsp;UNIVERSE</h1>
      <p class="subtitle">80,000 GPU particles · custom GLSL shaders · bloom</p>
    </header>

    <footer class="hud hud--bottom">
      <nav id="shapes" class="shapes" aria-label="Particle formations"></nav>
      <p class="hint">drag to orbit · scroll to zoom · particles auto-morph</p>
    </footer>

    <!-- Fallback shown if WebGL is unavailable -->
    <noscript>
      <div class="fallback">This experience needs JavaScript and WebGL.</div>
    </noscript>

    <script type="module" src="scripts/main.js"></script>
  </body>
</html>
